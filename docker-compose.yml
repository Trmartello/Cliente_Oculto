# Banco de dados MySQL para desenvolvimento local.
# Alternativa sem Docker: instalar mariadb-server e criar o banco/usuário
# conforme instruções no README.
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: cliente_oculto
      MYSQL_USER: oculto
      MYSQL_PASSWORD: oculto_dev
      MYSQL_ROOT_PASSWORD: root_dev
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
